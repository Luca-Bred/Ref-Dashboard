name: Kalender automatisch aktualisieren

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install requests

      - name: Kalender aktualisieren
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}
        run: python scripts/update_calendar.py

      - name: Aenderungen committen
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Kalender aktualisiert $(date '+%d.%m.%Y')"
          git push
